faq:
  - question: "กรุงเทพ-หัวหิน ใช้เวลาเดินทางเท่าไหร่?"
    answer: "ระยะทาง 200 กม. ใช้เวลาประมาณ 3 ชั่วโมง (ไม่รวมรถติด) เส้นทาง Highway 4 (พระราม 2) ผ่านเพชรบุรี ชะอำ ก่อนถึงหัวหิน"
  - question: "แวะเที่ยวระหว่างทางได้ไหม?"
    answer: "ได้ — ระหว่างทางมีจุดน่าแวะ เช่น Cafe Amazon เพชรบุรี, ตลาดน้ำชะอำ, สะพานเขายี่สาร แจ้งคนขับล่วงหน้า ถ้าออกนอกเส้นทางหลัก อาจคิดค่าทางเพิ่มตามระยะ"
  - question: "One-way / Round-trip / Day-trip ต่างกันยังไง?"
    answer: "One-way = ส่งครั้งเดียว · Round-trip = ไป-รอ-กลับวันเดียว สูงสุด 6 ชม. (เหมาะถ้าไปธุระ/ดินเนอร์) · Day-trip 12 ชม. = เที่ยวได้ทั้งวัน เหมาะกับครอบครัว/กลุ่มเที่ยว เพราะหัวหินไกลกว่าพัทยา ใช้ 12 ชม. แทน 10 ชม."
  - question: "ราคารวมค่าทางด่วนหรือไม่?"
    answer: "เส้นทาง Highway 4 ไม่ใช่ทางด่วน ไม่มีค่าผ่านทาง ราคาที่แจ้งรวมค่าน้ำมัน คนขับ จอด ภาษี และน้ำดื่ม ครบทั้งหมด ไม่มีค่าใช้จ่ายแอบแฝง"
  - question: "ไป Cha-am ก็ใช้บริการนี้ได้ไหม?"
    answer: "ได้ Cha-am อยู่บนเส้นทางเดียวกัน (ห่างหัวหินประมาณ 25 กม.) ราคาเท่ากันหรือถูกกว่าเล็กน้อย แจ้งจุดส่งจริงในฟอร์ม จะได้ใบเสนอราคาที่ตรง"
  - question: "ยกเลิกหรือเลื่อนวันได้ไหม?"
    answer: "ยกเลิกฟรีถ้าแจ้งก่อนเดินทาง 12 ชม. หากแจ้งน้อยกว่า 12 ชม. คิดค่าธรรมเนียม 30% ยืดหยุ่นในกรณีฝนหนัก/โควิด/เหตุสุดวิสัย"

