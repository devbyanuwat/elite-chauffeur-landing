faq:
  - question: "กรุงเทพ-พัทยา ใช้เวลาเดินทางเท่าไหร่?"
    answer: "ระยะทาง 147 กม. ใช้เวลาประมาณ 1 ชั่วโมง 45 นาที (ไม่รวมรถติด) เส้นทางมอเตอร์เวย์ 7 — สะดวก ปลอดภัย"
  - question: "One-way / Round-trip / Day-trip ต่างกันยังไง?"
    answer: "One-way = ส่งครั้งเดียว ปล่อยที่ปลายทาง · Round-trip = ไป-รอ-กลับวันเดียว สูงสุด 6 ชั่วโมง · Day-trip (10 ชม.) = ใช้เป็นรถเหมาทั้งวัน เที่ยวได้หลายจุด เหมาะสำหรับครอบครัวหรือกลุ่มเที่ยว"
  - question: "ราคารวมค่าทางด่วนหรือไม่?"
    answer: "ราคาที่แจ้งรวมค่าทางด่วนทั้งหมด (มอเตอร์เวย์ 7 ขาไป + กลับ) ค่าน้ำมัน ค่าคนขับ ค่าจอด ภาษี และน้ำดื่ม ไม่มีค่าใช้จ่ายแอบแฝง"
  - question: "คนขับรอที่ไหนช่วงระหว่างรอกลับ (Round-trip)?"
    answer: "คนขับจะอยู่ในจุดที่สะดวกใกล้ปลายทาง (โรงแรม / ห้าง / ชายหาด) ติดต่อได้ทาง LINE ตลอดเวลา ถ้าต้องการให้รอเกิน 6 ชม. แจ้งล่วงหน้า อาจมีค่ารอเพิ่มชั่วโมงละ 250-400 บาท"
  - question: "ถ้าอยากแวะกินข้าว / ถ่ายรูประหว่างทางได้ไหม?"
    answer: "ได้ — แจ้งกับคนขับล่วงหน้า ถ้าเป็นจุดมาตรฐาน (Cafe Amazon / ปั๊มน้ำมัน) แวะได้ฟรี ถ้าเป็นจุดที่ออกนอกเส้นทาง อาจคิดค่าทางเพิ่มตามระยะ"
  - question: "ยกเลิกหรือเลื่อนวันได้ไหม?"
    answer: "ยกเลิกฟรีถ้าแจ้งก่อนเดินทาง 12 ชม. หากแจ้งน้อยกว่า 12 ชม. คิดค่าธรรมเนียม 30% ยืดหยุ่นในกรณีฝนหนัก/โควิด/เหตุสุดวิสัย"

