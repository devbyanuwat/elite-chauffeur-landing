faq:
  - question: "ถ้าเที่ยวบินล่าช้า (delay) จะเป็นอย่างไร?"
    answer: "เราติดตามเที่ยวบินของคุณเรียลไทม์ คนขับจะปรับเวลารอรับตาม flight status อัตโนมัติ ไม่มีค่าใช้จ่ายเพิ่มเติมถ้า delay ไม่เกิน 60 นาที หลัง landing"
  - question: "คนขับจะรอรับที่ไหน? มีป้ายชื่อไหม?"
    answer: "คนขับรอรับที่ Arrival Hall ชั้น 2 (ทางออก Gate B หรือ Gate D) พร้อมป้ายชื่อของคุณ ก่อนคุณออกจาก Gate จะได้รับข้อความแจ้งตำแหน่งคนขับผ่าน LINE หรือ SMS"
  - question: "ราคาคิดอย่างไร? มีค่าใช้จ่ายแอบแฝงไหม?"
    answer: "ราคาเป็น flat rate ตามประเภทรถและโซนปลายทาง ราคาที่แจ้งรวมค่าทางด่วน ค่าน้ำมัน ค่ารอรับ 60 นาที และน้ำดื่ม ไม่มีค่าใช้จ่ายแอบแฝงใดๆ"
  - question: "ต้องการ child seat หรือ booster seat ขอได้ไหม?"
    answer: "ได้ค่ะ แจ้งในฟอร์มจองหรือทาง LINE ล่วงหน้าอย่างน้อย 12 ชม. มีค่าบริการเพิ่ม 300 บาทต่อที่นั่ง เรามีทั้ง baby seat (0-1 ปี), child seat (1-4 ปี), และ booster seat (4-10 ปี)"
  - question: "คนขับพูดภาษาอังกฤษได้ไหม?"
    answer: "แจ้งในฟอร์มจองว่าต้องการ English-speaking driver เราจะจัดคนขับที่สื่อสารภาษาอังกฤษได้ (ระดับ conversational) ไม่มีค่าใช้จ่ายเพิ่มเติม"
  - question: "ยกเลิกหรือเปลี่ยนแปลงได้ไหม?"
    answer: "ยกเลิก/เปลี่ยนแปลงฟรีถ้าแจ้งก่อนเวลารับ 6 ชั่วโมง หากแจ้งน้อยกว่านั้นคิดค่าธรรมเนียม 50% เรายืดหยุ่นในกรณีเที่ยวบินยกเลิก/เปลี่ยนตารางบิน แจ้งเราได้ผ่าน LINE"
