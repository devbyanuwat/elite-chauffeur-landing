faq:
  - question: "ถ้าเที่ยวบินล่าช้า (delay) จะเป็นอย่างไร?"
    answer: "เราติดตามเที่ยวบินของคุณเรียลไทม์ คนขับจะปรับเวลารอรับตาม flight status อัตโนมัติ ไม่มีค่าใช้จ่ายเพิ่มเติมถ้า delay ไม่เกิน 45 นาทีหลัง landing (ดอนเมืองตรวจคนเข้าเมืองเร็วกว่าสุวรรณภูมิ)"
  - question: "คนขับจะรอรับที่ไหน? Terminal ไหน?"
    answer: "ดอนเมืองมี 2 Terminal — Terminal 1 (ผู้โดยสารต่างประเทศ) รอที่ Gate 3 ชั้น 1 Arrival, Terminal 2 (ผู้โดยสารในประเทศ) รอที่ Gate 6 หรือ 8 ชั้น 1 คนขับมีป้ายชื่อ แจ้งตำแหน่งผ่าน LINE/SMS ก่อนออก Gate"
  - question: "ราคาคิดอย่างไร? มีค่าใช้จ่ายแอบแฝงไหม?"
    answer: "ราคาเป็น flat rate ตามประเภทรถและโซนปลายทาง ราคาที่แจ้งรวมค่าทางด่วน ค่าน้ำมัน ค่ารอรับ 45 นาที และน้ำดื่ม ไม่มีค่าใช้จ่ายแอบแฝงใดๆ"
  - question: "ต้องการ child seat หรือ booster seat ขอได้ไหม?"
    answer: "ได้ แจ้งในฟอร์มจองหรือทาง LINE ล่วงหน้าอย่างน้อย 12 ชม. ค่าบริการเพิ่ม 300 บาทต่อที่นั่ง มีทั้ง baby seat, child seat, และ booster seat"
  - question: "คนขับพูดภาษาอังกฤษได้ไหม?"
    answer: "แจ้งในฟอร์มจองว่าต้องการ English-speaking driver เราจะจัดคนขับที่สื่อสารภาษาอังกฤษได้ ไม่มีค่าใช้จ่ายเพิ่มเติม"
  - question: "ดอนเมือง vs สุวรรณภูมิ ต้องเลือกจุดรับต่างกันไหม?"
    answer: "ใช่ค่ะ ดอนเมือง (DMK) อยู่ทางเหนือของกรุงเทพฯ ใกล้รังสิต ส่วนสุวรรณภูมิ (BKK) อยู่ทางตะวันออก ใกล้บางนา ระยะทางและราคาต่างกัน โปรดเลือกสนามบินให้ถูกเที่ยวบิน"
    visibleAnswer: "ใช่ ดอนเมือง (DMK) อยู่ทางเหนือของกรุงเทพฯ ใกล้รังสิต ส่วนสุวรรณภูมิ (BKK) อยู่ทางตะวันออก ใกล้บางนา ระยะทางและราคาต่างกัน โปรดเลือกสนามบินให้ถูกเที่ยวบิน"

