# ======================================================
# Elite Chauffeur — GitHub Actions CI/CD
# Trigger: push ไป branch main
# Flow: Build Docker image → Push ไป GHCR → Watchtower pull อัตโนมัติ
# ======================================================

name: Build & Deploy Landing Page

on:
  push:
    branches:
      - main
      - dev
    paths:
      # Build ใหม่เมื่อ Astro source หรือ build config เปลี่ยน
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "astro.config.mjs"
      - "tsconfig.json"
      - "Dockerfile"
      - "nginx.conf"
      - ".github/workflows/deploy.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/elite-chauffeur-landing

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # สำหรับ push ไป GHCR

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx (multi-platform support)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login ไป GHCR ด้วย GITHUB_TOKEN (ไม่ต้องตั้ง secret เพิ่ม)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Generate image metadata (tags + labels)
      # NOTE: Infra redesign Phase 2 — target state is deploy by sha via sabuygo-infra pipeline
      # Current: sha-tag (canonical), :latest (main only), :dev (dev only) + Watchtower auto-pull
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag ด้วย commit SHA — canonical deploy reference
            type=sha,prefix=sha-,format=short
            # Tag เป็น latest เมื่อ push ไป main (kept for short-term Watchtower support)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag เป็น dev เมื่อ push ไป dev (kept for short-term Watchtower support)
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      # 5. Build และ Push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache จาก GHCR เพื่อเร่ง build
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # 6. Summary
      - name: Build summary
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV_NAME="Production (sabuygo.com)"
            IMAGE_TAG="latest"
          else
            ENV_NAME="Dev (dev-web.sabuygo.com)"
            IMAGE_TAG="dev"
          fi
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: **${ENV_NAME}**" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Watchtower จะ pull image ใหม่ภายใน 5 นาที" >> $GITHUB_STEP_SUMMARY

# dev-image bootstrap: trigger first :dev build on this registry owner
