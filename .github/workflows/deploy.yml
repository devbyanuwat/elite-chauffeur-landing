# ======================================================
# Elite Chauffeur — GitHub Actions CI/CD
# Trigger: push ไป branch main
# Flow: Build Docker image → Push ไป GHCR → Watchtower pull อัตโนมัติ
# ======================================================

name: Build & Deploy Landing Page

on:
  push:
    branches:
      - main
    paths:
      # Build ใหม่เฉพาะเมื่อ landing page files เปลี่ยน
      - "index.html"
      - "images/**"
      - "Dockerfile"
      - "nginx.conf"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/elite-chauffeur-landing

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # สำหรับ push ไป GHCR

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx (multi-platform support)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login ไป GHCR ด้วย GITHUB_TOKEN (ไม่ต้องตั้ง secret เพิ่ม)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Generate image metadata (tags + labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag ด้วย commit SHA (สำหรับ traceability)
            type=sha,prefix=sha-,format=short
            # Tag เป็น latest เมื่อ push ไป main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # 5. Build และ Push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache จาก GHCR เพื่อเร่ง build
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # 6. Summary
      - name: Build summary
        run: |
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Watchtower จะ pull image ใหม่ภายใน 5 นาที" >> $GITHUB_STEP_SUMMARY
