# ======================================================
# Elite Chauffeur — GitHub Actions CI/CD
# Trigger: push ไป branch main
# Flow: Build Docker image → Push ไป GHCR → Watchtower pull อัตโนมัติ
# ======================================================

name: Build & Deploy Landing Page

on:
  push:
    branches:
      - main
      - dev
    paths:
      # Build ใหม่เมื่อ landing page files หรือ workflow เปลี่ยน
      - "index.html"
      - "privacy.html"
      - "images/**"
      - "airport-transfer/**"
      - "routes/**"
      - "sitemap.xml"
      - "robots.txt"
      - "Dockerfile"
      - "nginx.conf"
      - ".github/workflows/deploy.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/elite-chauffeur-landing

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # สำหรับ push ไป GHCR

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx (multi-platform support)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login ไป GHCR ด้วย GITHUB_TOKEN (ไม่ต้องตั้ง secret เพิ่ม)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Generate image metadata (tags + labels)
      # NOTE: Infra redesign Phase 2 — target state is deploy by sha via sabuygo-infra pipeline
      # Current: sha-tag (canonical), :latest (main only), :dev (dev only) + Watchtower auto-pull
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag ด้วย commit SHA — canonical deploy reference
            type=sha,prefix=sha-,format=short
            # Tag เป็น latest เมื่อ push ไป main (kept for short-term Watchtower support)
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag เป็น dev เมื่อ push ไป dev (kept for short-term Watchtower support)
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}

      # 5. Build และ Push image
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache จาก GHCR เพื่อเร่ง build
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      # 6. Summary
      - name: Build summary
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV_NAME="Production (sabuygo.com)"
            IMAGE_TAG="latest"
          else
            ENV_NAME="Dev (dev-web.sabuygo.com)"
            IMAGE_TAG="dev"
          fi
          echo "### Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: **${ENV_NAME}**" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Watchtower จะ pull image ใหม่ภายใน 5 นาที" >> $GITHUB_STEP_SUMMARY

      # 7. Discord — แจ้งสำเร็จ (Rich Embed)
      - name: Notify Discord (Success)
        if: success()
        run: |
          # --- Branch config ---
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DOMAIN="sabuygo.com"
            DOMAIN_URL="https://sabuygo.com"
            ENV_LABEL="Production"
            IMAGE_TAG="latest"
            EMBED_COLOR=5763719
            ENV_EMOJI="🚀"
          else
            DOMAIN="dev-web.sabuygo.com"
            DOMAIN_URL="https://dev-web.sabuygo.com"
            ENV_LABEL="Preview"
            IMAGE_TAG="dev"
            EMBED_COLOR=3447003
            ENV_EMOJI="🧪"
          fi

          # --- Random success quote ---
          QUOTES=(
            "Ship it! 🚀"
            "Deployed with love 💖"
            "Another one in the books ✨"
            "Code is poetry 📝"
            "Latte is ready ☕"
            "ส่งแล้วว ขับดี 🚗"
            "อัพเสร็จละ พักก่อน 😎"
          )
          QUOTE="${QUOTES[$RANDOM % ${#QUOTES[@]}]}"

          # --- Safe commit message (escape special chars) ---
          RAW_MSG="${{ github.event.head_commit.message }}"
          COMMIT_MSG=$(echo "$RAW_MSG" | head -1 | cut -c1-100 | jq -Rsa .)
          # jq -Rsa . returns a JSON string with quotes — strip outer quotes for embedding
          COMMIT_MSG_CLEAN=$(echo "$COMMIT_MSG" | sed 's/^"//;s/"$//')

          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA::7}"

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # --- Build embed JSON with jq for safety ---
          jq -n \
            --arg title "${ENV_EMOJI} Deploy Success — ${DOMAIN}" \
            --arg quote "$QUOTE" \
            --arg domain_url "$DOMAIN_URL" \
            --argjson color "$EMBED_COLOR" \
            --arg actor "${{ github.actor }}" \
            --arg actor_url "https://github.com/${{ github.actor }}" \
            --arg actor_icon "https://github.com/${{ github.actor }}.png" \
            --arg env_label "$ENV_LABEL" \
            --arg branch "${{ github.ref_name }}" \
            --arg image_tag "$IMAGE_TAG" \
            --arg short_sha "$SHORT_SHA" \
            --arg commit_url "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            --arg commit_msg "$COMMIT_MSG_CLEAN" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg timestamp "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                description: ("*" + $quote + "*\n\n[**View Site →**](" + $domain_url + ")"),
                color: $color,
                author: {
                  name: $actor,
                  url: $actor_url,
                  icon_url: $actor_icon
                },
                thumbnail: {
                  url: "https://sabuygo.com/images/logo.png"
                },
                fields: [
                  { name: "🌐 Environment", value: $env_label, inline: true },
                  { name: "🔗 URL", value: ("[Open](" + $domain_url + ")"), inline: true },
                  { name: "🌿 Branch", value: ("`" + $branch + "`"), inline: true },
                  { name: "📦 Image Tag", value: ("`" + $image_tag + "`"), inline: true },
                  { name: "🆔 Commit", value: ("[`" + $short_sha + "`](" + $commit_url + ")"), inline: true },
                  { name: "💬 Message", value: $commit_msg, inline: false },
                  { name: "👷 Workflow", value: ("[View Run](" + $run_url + ")"), inline: true }
                ],
                footer: {
                  text: "Sabaigo Deploy Bot • Watchtower will pull in ~5min",
                  icon_url: "https://github.githubassets.com/favicons/favicon.png"
                },
                timestamp: $timestamp
              }]
            }' \
          | curl -s -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d @- \
              "${{ secrets.DISCORD_WEBHOOK_URL }}"

      # 8. Discord — แจ้ง fail (Rich Embed)
      - name: Notify Discord (Failure)
        if: failure()
        run: |
          # --- Branch config ---
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DOMAIN="sabuygo.com"
            ENV_LABEL="Production"
          else
            DOMAIN="dev-web.sabuygo.com"
            ENV_LABEL="Preview"
          fi

          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA::7}"

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          RAW_MSG="${{ github.event.head_commit.message }}"
          COMMIT_MSG_CLEAN=$(echo "$RAW_MSG" | head -1 | cut -c1-100)

          jq -n \
            --arg title "❌ Deploy Failed — ${DOMAIN}" \
            --argjson color 15548997 \
            --arg actor "${{ github.actor }}" \
            --arg actor_url "https://github.com/${{ github.actor }}" \
            --arg actor_icon "https://github.com/${{ github.actor }}.png" \
            --arg env_label "$ENV_LABEL" \
            --arg branch "${{ github.ref_name }}" \
            --arg short_sha "$SHORT_SHA" \
            --arg commit_url "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            --arg commit_msg "$COMMIT_MSG_CLEAN" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg timestamp "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                description: ("Build ไม่ผ่านค่ะ — กรุณาตรวจสอบ logs\n\n[**View Logs →**](" + $run_url + ")"),
                color: $color,
                author: {
                  name: $actor,
                  url: $actor_url,
                  icon_url: $actor_icon
                },
                thumbnail: {
                  url: "https://sabuygo.com/images/logo.png"
                },
                fields: [
                  { name: "🌐 Environment", value: $env_label, inline: true },
                  { name: "🌿 Branch", value: ("`" + $branch + "`"), inline: true },
                  { name: "🆔 Commit", value: ("[`" + $short_sha + "`](" + $commit_url + ")"), inline: true },
                  { name: "💬 Message", value: $commit_msg, inline: false },
                  { name: "🔍 Error", value: "ดู logs ที่ [**Workflow Run**](" + $run_url + ")", inline: false }
                ],
                footer: {
                  text: "Sabaigo Deploy Bot • Something went wrong",
                  icon_url: "https://github.githubassets.com/favicons/favicon.png"
                },
                timestamp: $timestamp
              }]
            }' \
          | curl -s -o /dev/null -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d @- \
              "${{ secrets.DISCORD_WEBHOOK_URL }}"
