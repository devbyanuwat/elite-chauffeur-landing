server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets — 1 year for immutable files
    location ~* \.(jpg|jpeg|webp|png|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # CSS/JS — 30 days (may change with content)
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Block dotfiles (.env, .git, ...) but keep .well-known for ACME/TLS
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        return 404;
    }

    # Static site never serves these — bot scanners only. Return cheap 404
    # instead of falling back to the full 130KB index.html.
    location ~* \.(php|asp|aspx|jsp|cgi|pl|sql|bak|old|env)$ {
        access_log off;
        return 404;
    }
    location ~* ^/(wp-admin|wp-login|wp-content|wp-includes|xmlrpc|phpmyadmin|phpinfo|admin|administrator)(/|$|\.) {
        access_log off;
        return 404;
    }

    # Blog — บทความ static (mount จาก shared volume blog_content)
    # 404 ถ้าไม่มีจริง (ไม่ fallback ไป index.html) เพื่อ SEO ที่ถูกต้อง
    location /blog/ {
        try_files $uri $uri/ =404;
    }

    # Main page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
}
